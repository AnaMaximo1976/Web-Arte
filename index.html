<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<title>A Vida Presta</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    height:100vh;
    position:relative;
    font-family:'Permanent Marker',cursive;
    background:linear-gradient(180deg,#667f50 0%,#5c7446 40%,#4f643d 100%);
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(rgba(255,255,255,.08) 1px,transparent 1px);
    background-size:7px 7px;
    opacity:.5;
}

body::after{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(transparent,transparent 6px,rgba(255,255,255,.03) 7px);
    opacity:.4;
}

.phrase{
    position:absolute;
    color:#f3d99a;
    text-shadow:5px 5px 0 #8b2018;
    line-height:.95;
    z-index:200;
}

.p1{top:40px;left:40px;font-size:2.8rem;transform:rotate(-10deg);}
.p2{top:90px;right:20px;width:260px;font-size:1.9rem;text-align:right;transform:rotate(8deg);}
.p3{left:30px;bottom:120px;width:340px;font-size:2rem;transform:rotate(-8deg);}
.p4{left:120px;bottom:330px;font-size:2rem;transform:rotate(-12deg);}
.p5{left:50%;top:80px;transform:translateX(-50%);font-size:4rem;}
.p6{right:40px;bottom:60px;font-size:1.8rem;transform:rotate(8deg);}
.p7{top:330px;right:40px;font-size:1.8rem;transform:rotate(-6deg);}
.p8{bottom:260px;left:45%;font-size:1.7rem;transform:rotate(6deg);}

.star{
    position:absolute;
    clip-path:polygon(50% 0%,58% 34%,100% 50%,58% 66%,50% 100%,42% 66%,0% 50%,42% 34%);
    opacity:.95;
}

.star-blue{width:230px;height:230px;background:#1735a8;left:-60px;top:260px;}
.star-red{width:230px;height:230px;background:#9f1714;right:-60px;top:420px;}
.star-yellow{width:180px;height:180px;background:#f1c232;left:280px;top:120px;}
.star-white1{width:140px;height:140px;background:#f7f5ec;left:430px;bottom:80px;}
.star-white2{width:120px;height:120px;background:#f7f5ec;right:260px;top:260px;}

.guitar{
    position:absolute;
    left:50%;
    top:56%;
    transform:translate(-50%,-50%);
}

.neck{width:42px;height:260px;background:#a16c34;position:absolute;left:-21px;top:-220px;}
.head{width:80px;height:40px;background:#a16c34;position:absolute;left:-40px;top:-250px;border-radius:20px;}
.upper{width:180px;height:220px;background:#e0b26f;border-radius:50%;position:absolute;left:-90px;}
.lower{width:280px;height:340px;background:#e0b26f;border-radius:50%;position:absolute;left:-140px;top:120px;}
.hole{width:80px;height:80px;border-radius:50%;background:#5a6f48;position:absolute;left:-40px;top:220px;}
.string{position:absolute;width:2px;background:#fff6d8;height:680px;top:-220px;}
.s1{left:-15px}.s2{left:-7px}.s3{left:0}.s4{left:7px}.s5{left:15px}

.banjo{
    position:absolute;
    left:62%;
    top:48%;
    transform:rotate(18deg) scale(1.15);
}

.banjo-neck{width:20px;height:180px;background:#9b6730;margin:auto;}
.banjo-body{width:140px;height:140px;border-radius:50%;background:#efe6cc;border:18px solid #c18440;}

.pandeiro{
    position:absolute;
    right:120px;
    top:420px;
    width:170px;
    height:170px;
    border-radius:50%;
    border:18px solid #d7aa45;
    background:#efe6cc;
}
</style>
</head>
<body>

<div class="phrase p1">EU ACHO É POUCO</div>
<div class="phrase p2">CAMARÃO QUE DORME<br>A ONDA LEVA</div>
<div class="phrase p3">A ESPERANÇA É A<br>ÚLTIMA QUE MORRE</div>
<div class="phrase p4">BONITO POR<br>NATUREZA</div>
<div class="phrase p5">A VIDA PRESTA</div>
<div class="phrase p6">RIO DE JANEIRO<br>CONTINUA LINDO</div>
<div class="phrase p7">TUDO NOSSO<br>NADA DELES</div>

<div class="star star-blue"></div>
<div class="star star-red"></div>
<div class="star star-yellow"></div>
<div class="star star-white1"></div>
<div class="star star-white2"></div>

<div class="guitar">
<div class="head"></div>
<div class="neck"></div>
<div class="upper"></div>
<div class="lower"></div>
<div class="hole"></div>
<div class="string s1"></div>
<div class="string s2"></div>
<div class="string s3"></div>
<div class="string s4"></div>
<div class="string s5"></div>
</div>

<div class="banjo">
<div class="banjo-neck"></div>
<div class="banjo-body"></div>
</div>

<div class="pandeiro"></div>

</body>
</html>
